<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5a52e0"/>
      <stop offset="100%" stop-color="#151515"/>
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff2d55"/>
      <stop offset="100%" stop-color="#ff6b9d"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Heart rate line -->
  <g opacity="0.7">
    <polyline points="50,320 150,320 180,320 210,280 240,360 270,300 300,320 330,320 360,320 390,320 420,240 450,400 480,310 510,320 540,320 570,320 600,320 630,260 660,380 690,300 720,320 750,320" fill="none" stroke="url(#neon)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Phone mockup -->
  <g transform="translate(320,140)">
    <rect x="0" y="0" width="160" height="300" rx="20" fill="#1a1a2e" stroke="#333" stroke-width="2"/>
    <rect x="10" y="30" width="140" height="240" rx="4" fill="#0d1117"/>
    <circle cx="80" cy="20" r="4" fill="#333"/>
    <!-- Reels icon -->
    <rect x="30" y="70" width="100" height="160" rx="10" fill="none" stroke="url(#neon)" stroke-width="1.5" opacity="0.5"/>
    <polygon points="70,130 70,190 110,160" fill="url(#neon)" opacity="0.4"/>
  </g>
  <!-- Pulse circles -->
  <circle cx="400" cy="480" r="30" fill="none" stroke="#ff2d55" stroke-width="1" opacity="0.2"/>
  <circle cx="400" cy="480" r="50" fill="none" stroke="#ff2d55" stroke-width="1" opacity="0.1"/>
  <text x="400" y="560" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="16" fill="url(#neon)" opacity="0.5" letter-spacing="6">PULSE FITNESS</text>
</svg>