<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#141420"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="50%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#6C63FF"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g opacity="0.08" stroke="#6C63FF" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/><line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/><line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>
  <!-- Abstract motion paths -->
  <path d="M200,300 Q300,150 400,300 Q500,450 600,300" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.5"/>
  <path d="M180,320 Q300,170 400,320 Q500,470 620,320" fill="none" stroke="url(#glow)" stroke-width="1" opacity="0.2"/>
  <!-- Nodes -->
  <circle cx="200" cy="300" r="5" fill="#6C63FF" opacity="0.8"/>
  <circle cx="400" cy="300" r="6" fill="#00d4ff" opacity="0.9"/>
  <circle cx="600" cy="300" r="5" fill="#6C63FF" opacity="0.8"/>
  <circle cx="400" cy="300" r="20" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <circle cx="400" cy="300" r="40" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.15"/>
  <!-- Letter A -->
  <text x="400" y="310" text-anchor="middle" font-family="sans-serif" font-weight="200" font-size="60" fill="url(#glow)" opacity="0.15">A</text>
  <text x="400" y="530" text-anchor="middle" font-family="monospace" font-size="14" fill="url(#glow)" opacity="0.4" letter-spacing="12">AETHER</text>
</svg>