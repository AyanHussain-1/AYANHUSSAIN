<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="sunset" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="50%" stop-color="#c850c0"/>
      <stop offset="100%" stop-color="#2d1b69"/>
    </linearGradient>
    <linearGradient id="mountain" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#2d3a4a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Mountains -->
  <polygon points="0,450 200,250 400,380 600,220 800,350 800,600 0,600" fill="url(#mountain)" opacity="0.6"/>
  <polygon points="0,480 150,320 350,400 500,300 700,380 800,340 800,600 0,600" fill="#0d1117" opacity="0.8"/>
  <!-- Sun -->
  <circle cx="550" cy="200" r="50" fill="url(#sunset)" opacity="0.7"/>
  <circle cx="550" cy="200" r="70" fill="none" stroke="#ff6b35" stroke-width="0.5" opacity="0.3"/>
  <!-- Play button overlay -->
  <circle cx="400" cy="280" r="36" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2" opacity="0.7"/>
  <polygon points="392,265 392,295 418,280" fill="white" opacity="0.8"/>
  <text x="400" y="540" text-anchor="middle" font-family="sans-serif" font-weight="300" font-size="18" fill="white" opacity="0.4" letter-spacing="8">WANDERLUST</text>
</svg>